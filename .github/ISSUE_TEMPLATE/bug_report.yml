name: 🐛 Bug report
description: Report something that isn't working as expected.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running Openbeehive?
      options:
        - Hosted service (app.openbeehive.org)
        - Self-hosted — single binary (selfhost profile)
        - Self-hosted — Docker / cloud profile
        - Local development
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser/OS, device, database and blob backend if self-hosting.
      placeholder: "e.g. Firefox 126 on Android 14; Postgres + MinIO"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
