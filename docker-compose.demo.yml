# Hosted demo deployment (app.openbeehive.org): invite-only registration plus
# a public read-only demo tenant that reseeds hourly.
#
# Unlike docker-compose.yml (local development), this file is production-
# shaped: no database/MinIO ports on the host, restart policies, healthchecks,
# and every secret must come from the environment / an .env file next to it:
#
#   BEEHIVE_SESSION_SECRET   openssl rand -base64 32   (sessions survive restarts)
#   POSTGRES_PASSWORD        openssl rand -base64 24
#   MINIO_ROOT_PASSWORD      openssl rand -base64 24
#   BEEHIVE_DEMO_PASSWORD    anything non-default (blocks password sign-in as the demo user)
#
# Run:  docker compose -f docker-compose.demo.yml up -d
# TLS terminates at your reverse proxy, which forwards to :8080.
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: openbeehive
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: openbeehive
    volumes: [pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbeehive -d openbeehive"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: openbeehive
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes: [minio:/data]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    # Published by .github/workflows/release.yml on each v* tag.
    # Also available: :0.1 (minor track) and :latest.
    image: ghcr.io/johnnycube/openbeehive-app:0.1.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["8080:8080"]
    environment:
      BEEHIVE_DEPLOYMENT_PROFILE: cloud
      BEEHIVE_PUBLIC_BASE_URL: ${BEEHIVE_PUBLIC_BASE_URL:-https://app.openbeehive.org}
      BEEHIVE_CORS_ALLOWED_ORIGINS: ${BEEHIVE_PUBLIC_BASE_URL:-https://app.openbeehive.org}
      BEEHIVE_DATABASE_DSN: postgres://openbeehive:${POSTGRES_PASSWORD}@postgres:5432/openbeehive?sslmode=disable
      BEEHIVE_MINIO_ENDPOINT: minio:9000
      BEEHIVE_MINIO_ACCESS_KEY: openbeehive
      BEEHIVE_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      BEEHIVE_SESSION_SECRET: ${BEEHIVE_SESSION_SECRET:?set BEEHIVE_SESSION_SECRET in .env}
      # Invite-only launch: no open registration; the sign-in screen shows a
      # notice. The first account created on the fresh instance is the admin,
      # who invites everyone else from Settings.
      BEEHIVE_REGISTRATION: "false"
      # Public demo tenant: read-only sessions, seed data reset every hour.
      BEEHIVE_DEMO: "true"
      BEEHIVE_DEMO_PASSWORD: ${BEEHIVE_DEMO_PASSWORD:?set BEEHIVE_DEMO_PASSWORD in .env}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pg:
  minio:
